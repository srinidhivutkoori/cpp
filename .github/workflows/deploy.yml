name: CI/CD Pipeline - Academic Conference Paper Submission System

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-west-1
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # ──────────────────────────────────────────────
  # Job 1 - Test the confmanager library
  # ──────────────────────────────────────────────
  test-library:
    name: Test confmanager Library
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install library and run tests
        run: cd library && pip install -e . && pip install pytest && pytest tests/ -v

  # ──────────────────────────────────────────────
  # Job 2 - Deploy backend (Lambda + DynamoDB + S3 + SNS + API Gateway)
  # ──────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to AWS
    runs-on: ubuntu-latest
    needs: test-library
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── DynamoDB ──
      - name: Create DynamoDB table
        run: |
          aws dynamodb create-table \
            --table-name confpapers-prod \
            --attribute-definitions AttributeName=id,AttributeType=S \
            --key-schema AttributeName=id,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region ${{ env.AWS_REGION }} || true

      # ── S3 bucket for file uploads ──
      - name: Create S3 bucket for files
        run: |
          aws s3api create-bucket \
            --bucket confpapers-files-prod-srinidhi \
            --region ${{ env.AWS_REGION }} \
            --create-bucket-configuration LocationConstraint=${{ env.AWS_REGION }} || true

      - name: Configure S3 CORS
        run: |
          aws s3api put-bucket-cors \
            --bucket confpapers-files-prod-srinidhi \
            --cors-configuration '{
              "CORSRules": [
                {
                  "AllowedHeaders": ["*"],
                  "AllowedMethods": ["GET", "PUT", "POST", "DELETE"],
                  "AllowedOrigins": ["*"],
                  "ExposeHeaders": ["ETag"],
                  "MaxAgeSeconds": 3600
                }
              ]
            }' || true

      # ── IAM role for Lambda ──
      - name: Create IAM role for Lambda
        run: |
          aws iam create-role \
            --role-name confpapers-lambda-role \
            --assume-role-policy-document '{
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": { "Service": "lambda.amazonaws.com" },
                  "Action": "sts:AssumeRole"
                }
              ]
            }' || true

      - name: Attach DynamoDB policy
        run: |
          aws iam attach-role-policy \
            --role-name confpapers-lambda-role \
            --policy-arn arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess || true

      - name: Attach S3 policy
        run: |
          aws iam attach-role-policy \
            --role-name confpapers-lambda-role \
            --policy-arn arn:aws:iam::aws:policy/AmazonS3FullAccess || true

      - name: Attach SNS policy
        run: |
          aws iam attach-role-policy \
            --role-name confpapers-lambda-role \
            --policy-arn arn:aws:iam::aws:policy/AmazonSNSFullAccess || true

      - name: Attach Lambda basic execution policy
        run: |
          aws iam attach-role-policy \
            --role-name confpapers-lambda-role \
            --policy-arn arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole || true

      # ── SNS topic ──
      - name: Create SNS topic
        run: |
          SNS_ARN=$(aws sns create-topic \
            --name confpapers-notifications \
            --region ${{ env.AWS_REGION }} \
            --query 'TopicArn' --output text)
          echo "SNS_TOPIC_ARN=$SNS_ARN" >> $GITHUB_ENV

      # ── Wait for IAM propagation ──
      - name: Wait for IAM role propagation
        run: sleep 10

      # ── Package Lambda ──
      - name: Package Lambda function
        run: |
          cd backend
          pip install -r requirements.txt -t package/
          cp -r *.py models/ routes/ services/ config.py package/ 2>/dev/null || true
          cd ../library
          cp -r confmanager/ ../backend/package/
          cd ../backend/package
          zip -r9 ../../function.zip .
          cd ../..

      # ── Deploy Lambda ──
      - name: Deploy Lambda function
        run: |
          ROLE_ARN=$(aws iam get-role --role-name confpapers-lambda-role --query 'Role.Arn' --output text)

          if aws lambda get-function --function-name confpapers-api --region ${{ env.AWS_REGION }} > /dev/null 2>&1; then
            aws lambda update-function-code \
              --function-name confpapers-api \
              --zip-file fileb://function.zip \
              --region ${{ env.AWS_REGION }}

            aws lambda update-function-configuration \
              --function-name confpapers-api \
              --environment "Variables={DYNAMODB_TABLE=confpapers-prod,S3_BUCKET=confpapers-files-prod-srinidhi,SNS_TOPIC_ARN=${{ env.SNS_TOPIC_ARN }},REGION=${{ env.AWS_REGION }},JWT_SECRET=confpapers-secret-2026}" \
              --region ${{ env.AWS_REGION }}
          else
            aws lambda create-function \
              --function-name confpapers-api \
              --runtime python3.11 \
              --handler app.lambda_handler \
              --role $ROLE_ARN \
              --zip-file fileb://function.zip \
              --timeout 30 \
              --memory-size 256 \
              --environment "Variables={DYNAMODB_TABLE=confpapers-prod,S3_BUCKET=confpapers-files-prod-srinidhi,SNS_TOPIC_ARN=${{ env.SNS_TOPIC_ARN }},REGION=${{ env.AWS_REGION }},JWT_SECRET=confpapers-secret-2026}" \
              --region ${{ env.AWS_REGION }}
          fi

      # ── API Gateway ──
      - name: Create or get API Gateway
        run: |
          API_ID=$(aws apigateway get-rest-apis --region ${{ env.AWS_REGION }} \
            --query "items[?name=='confpapers-api'].id" --output text)

          if [ -z "$API_ID" ] || [ "$API_ID" = "None" ]; then
            API_ID=$(aws apigateway create-rest-api \
              --name confpapers-api \
              --description "Academic Conference Paper Submission API" \
              --endpoint-configuration types=REGIONAL \
              --region ${{ env.AWS_REGION }} \
              --query 'id' --output text)
          fi
          echo "API_ID=$API_ID" >> $GITHUB_ENV

      - name: Configure API Gateway proxy resource
        run: |
          ROOT_ID=$(aws apigateway get-resources --rest-api-id ${{ env.API_ID }} \
            --region ${{ env.AWS_REGION }} \
            --query "items[?path=='/'].id" --output text)

          # Create {proxy+} resource
          PROXY_ID=$(aws apigateway get-resources --rest-api-id ${{ env.API_ID }} \
            --region ${{ env.AWS_REGION }} \
            --query "items[?pathPart=='{proxy+}'].id" --output text)

          if [ -z "$PROXY_ID" ] || [ "$PROXY_ID" = "None" ]; then
            PROXY_ID=$(aws apigateway create-resource \
              --rest-api-id ${{ env.API_ID }} \
              --parent-id $ROOT_ID \
              --path-part "{proxy+}" \
              --region ${{ env.AWS_REGION }} \
              --query 'id' --output text)
          fi
          echo "PROXY_ID=$PROXY_ID" >> $GITHUB_ENV
          echo "ROOT_ID=$ROOT_ID" >> $GITHUB_ENV

      - name: Configure ANY method on proxy resource
        run: |
          LAMBDA_ARN=$(aws lambda get-function --function-name confpapers-api \
            --region ${{ env.AWS_REGION }} --query 'Configuration.FunctionArn' --output text)

          # ANY on {proxy+}
          aws apigateway put-method \
            --rest-api-id ${{ env.API_ID }} \
            --resource-id ${{ env.PROXY_ID }} \
            --http-method ANY \
            --authorization-type NONE \
            --region ${{ env.AWS_REGION }} || true

          aws apigateway put-integration \
            --rest-api-id ${{ env.API_ID }} \
            --resource-id ${{ env.PROXY_ID }} \
            --http-method ANY \
            --type AWS_PROXY \
            --integration-http-method POST \
            --uri "arn:aws:apigateway:${{ env.AWS_REGION }}:lambda:path/2015-03-31/functions/$LAMBDA_ARN/invocations" \
            --region ${{ env.AWS_REGION }} || true

      - name: Configure OPTIONS CORS on proxy resource
        run: |
          aws apigateway put-method \
            --rest-api-id ${{ env.API_ID }} \
            --resource-id ${{ env.PROXY_ID }} \
            --http-method OPTIONS \
            --authorization-type NONE \
            --region ${{ env.AWS_REGION }} || true

          aws apigateway put-method-response \
            --rest-api-id ${{ env.API_ID }} \
            --resource-id ${{ env.PROXY_ID }} \
            --http-method OPTIONS \
            --status-code 200 \
            --response-parameters '{"method.response.header.Access-Control-Allow-Headers":false,"method.response.header.Access-Control-Allow-Methods":false,"method.response.header.Access-Control-Allow-Origin":false,"method.response.header.Access-Control-Allow-Credentials":false}' \
            --region ${{ env.AWS_REGION }} || true

          aws apigateway put-integration \
            --rest-api-id ${{ env.API_ID }} \
            --resource-id ${{ env.PROXY_ID }} \
            --http-method OPTIONS \
            --type MOCK \
            --request-templates '{"application/json":"{\"statusCode\":200}"}' \
            --region ${{ env.AWS_REGION }} || true

          aws apigateway put-integration-response \
            --rest-api-id ${{ env.API_ID }} \
            --resource-id ${{ env.PROXY_ID }} \
            --http-method OPTIONS \
            --status-code 200 \
            --response-parameters '{"method.response.header.Access-Control-Allow-Headers":"'"'"'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"'"'","method.response.header.Access-Control-Allow-Methods":"'"'"'GET,POST,PUT,DELETE,OPTIONS'"'"'","method.response.header.Access-Control-Allow-Origin":"'"'"'*'"'"'","method.response.header.Access-Control-Allow-Credentials":"'"'"'true'"'"'"}' \
            --region ${{ env.AWS_REGION }} || true

      - name: Configure root ANY method
        run: |
          LAMBDA_ARN=$(aws lambda get-function --function-name confpapers-api \
            --region ${{ env.AWS_REGION }} --query 'Configuration.FunctionArn' --output text)

          aws apigateway put-method \
            --rest-api-id ${{ env.API_ID }} \
            --resource-id ${{ env.ROOT_ID }} \
            --http-method ANY \
            --authorization-type NONE \
            --region ${{ env.AWS_REGION }} || true

          aws apigateway put-integration \
            --rest-api-id ${{ env.API_ID }} \
            --resource-id ${{ env.ROOT_ID }} \
            --http-method ANY \
            --type AWS_PROXY \
            --integration-http-method POST \
            --uri "arn:aws:apigateway:${{ env.AWS_REGION }}:lambda:path/2015-03-31/functions/$LAMBDA_ARN/invocations" \
            --region ${{ env.AWS_REGION }} || true

      - name: Add Lambda invoke permission for API Gateway
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          aws lambda add-permission \
            --function-name confpapers-api \
            --statement-id apigateway-invoke \
            --action lambda:InvokeFunction \
            --principal apigateway.amazonaws.com \
            --source-arn "arn:aws:execute-api:${{ env.AWS_REGION }}:$ACCOUNT_ID:${{ env.API_ID }}/*" \
            --region ${{ env.AWS_REGION }} || true

      - name: Deploy API Gateway
        run: |
          aws apigateway create-deployment \
            --rest-api-id ${{ env.API_ID }} \
            --stage-name prod \
            --region ${{ env.AWS_REGION }}

          echo "API_URL=https://${{ env.API_ID }}.execute-api.${{ env.AWS_REGION }}.amazonaws.com/prod" >> $GITHUB_ENV

  # ──────────────────────────────────────────────
  # Job 3 - Deploy frontend to S3
  # ──────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to S3
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get API Gateway URL
        run: |
          API_ID=$(aws apigateway get-rest-apis --region ${{ env.AWS_REGION }} \
            --query "items[?name=='confpapers-api'].id" --output text)
          echo "VITE_API_URL=https://$API_ID.execute-api.${{ env.AWS_REGION }}.amazonaws.com/prod" >> $GITHUB_ENV

      - name: Install and build frontend
        run: |
          cd frontend
          npm install
          REACT_APP_API_URL=${{ env.VITE_API_URL }} npm run build
        env:
          CI: false

      - name: Create S3 frontend bucket
        run: |
          aws s3api create-bucket \
            --bucket confpapers-frontend-prod-srinidhi \
            --region ${{ env.AWS_REGION }} \
            --create-bucket-configuration LocationConstraint=${{ env.AWS_REGION }} || true

      - name: Configure static website hosting
        run: |
          aws s3 website s3://confpapers-frontend-prod-srinidhi/ \
            --index-document index.html \
            --error-document index.html

      - name: Disable block public access
        run: |
          aws s3api put-public-access-block \
            --bucket confpapers-frontend-prod-srinidhi \
            --public-access-block-configuration \
              "BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false"

      - name: Set public read bucket policy
        run: |
          aws s3api put-bucket-policy \
            --bucket confpapers-frontend-prod-srinidhi \
            --policy '{
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Sid": "PublicReadGetObject",
                  "Effect": "Allow",
                  "Principal": "*",
                  "Action": "s3:GetObject",
                  "Resource": "arn:aws:s3:::confpapers-frontend-prod-srinidhi/*"
                }
              ]
            }'

      - name: Sync frontend to S3
        run: |
          aws s3 sync frontend/build/ s3://confpapers-frontend-prod-srinidhi/ --delete
